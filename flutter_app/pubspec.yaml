name: who_gis_surveillance
description: WHO GIS Surveillance & Immunization Mapping Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_polyline_points: ^2.0.0

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1
  connectivity_plus: ^6.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Location & GPS
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  location: ^7.0.1

  # Camera & Media
  image_picker: ^1.1.2

  # Auth
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Offline Sync
  workmanager: ^0.9.0
  background_fetch: ^1.3.1
  syncfusion_flutter_xlsio: ^28.1.33

  # Maps
  google_maps_flutter: ^2.10.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.2.1
  firebase_core: ^3.10.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  logger: ^2.5.0
  package_info_plus: ^8.1.1
  device_info_plus: ^11.3.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.1
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env

  # fonts:
